# 容器内 Nginx 配置：Cookie 会话认证 + 反向代理 + 通知脚本自动注入
# 由 start.sh 在容器启动时拉起 auth-server（127.0.0.1:19893）
#
# 架构：
#   浏览器 → :1989 (Nginx)
#              ├─ /login              → 返回登录页 HTML（免认证）
#              ├─ /_auth   (POST)     → auth-server 校验账号密码，下发签名 cookie
#              ├─ /_logout (GET/POST) → auth-server 清除 cookie，跳回登录页
#              ├─ /_check  (GET)      → auth-server 校验 cookie（供 auth_request 子请求）
#              ├─ /notify/inject.js   → 本地 JS 文件（免认证）
#              ├─ /healthz            → 健康检查（免认证）
#              ├─ /notify/            → notify-watcher（需 cookie 认证）
#              └─ /                   → Xpra HTML5（需 cookie 认证）
#                                    └─ auth_request 校验失败 → 302 跳 /login?next=<原URL>

# WebSocket 升级映射（Xpra 依赖 WebSocket）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 1989 default_server;
    listen [::]:1989 default_server;

    server_name _;

    charset utf-8;
    client_max_body_size 1024M;

    # ===== 登录页（免认证）=====
    # 直接返回容器内静态 HTML，无需经过认证
    location = /login {
        auth_request off;
        root /usr/local/share/xwechat;
        try_files /login.html =404;
        add_header Cache-Control "no-store" always;
    }

    # ===== 登录提交接口（免认证，否则永远无法登录）=====
    location = /_auth {
        auth_request off;
        proxy_pass http://127.0.0.1:19893;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_set_header Content-Length $content_length;
    }

    # ===== 登出接口（免认证）=====
    location = /_logout {
        auth_request off;
        proxy_pass http://127.0.0.1:19893;
        proxy_set_header Host $host;
    }

    # ===== 文件上传端点（需登录，用于 Ctrl+V 粘贴文件到微信）=====
    location = /_upload-file {
        auth_request off;
        proxy_pass http://127.0.0.1:19893;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        # 允许大文件上传
        client_max_body_size 100m;
    }

    # ===== auth_request 子请求端点（内部，不直接对外）=====
    location = /_check {
        internal;
        auth_request off;
        proxy_pass http://127.0.0.1:19893;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # 透传客户端 Cookie 给 auth-server 校验
        proxy_set_header Cookie $http_cookie;
    }

    # ===== 通知脚本（注入到 HTML5 客户端页面，免认证）=====
    # 脚本本身不含敏感数据，让 <script> 标签能直接加载
    location = /notify/inject.js {
        auth_request off;
        alias /usr/local/share/xwechat/notify-inject.js;
        default_type application/javascript;
        charset utf-8;
        add_header Cache-Control "no-store" always;
    }

    # ===== 文件粘贴助手（支持 Ctrl+V 粘贴图片/文件到微信）=====
    location = /paste-helper.js {
        auth_request off;
        alias /usr/local/share/xwechat/paste-helper.js;
        default_type application/javascript;
        charset utf-8;
        add_header Cache-Control "no-store" always;
    }

    # ===== 健康检查端点（免认证，用于容器编排）=====
    location = /healthz {
        auth_request off;
        proxy_pass http://127.0.0.1:19892/healthz;
    }

    # ===== 微信主界面（Xpra HTML5 客户端，需 cookie 认证）=====
    location / {
        # 子请求校验 cookie；失败（401）时走 @login_redirect
        auth_request /_check;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:8080;

        # 关键：WebSocket 升级支持（Xpra 通信依赖）
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 透传客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Xpra 会保持长连接，默认 60s 不够
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering     off;

        # ===== 自动注入消息通知脚本 + 中文化 =====
        # 关闭上游 gzip 压缩，让 sub_filter 能修改 HTML 响应
        proxy_set_header Accept-Encoding "";

        # 在 </body> 前注入 <script> 标签 + 隐藏标题栏/托盘/浮动菜单的 CSS（粘贴逻辑已合并到 inject.js）
        sub_filter '</body>' '<style>.windowbuttons{display:none!important}#windowlist{display:none!important}.undecorated .window_border{border:none!important}.window.tray{display:none!important}#float_tray{display:none!important}.windowhead{display:none!important}#float_menu{display:none!important}</style><script src="/notify/inject.js"></script></body>';

        # ===== connect.html 中文化 =====
        sub_filter '<h2 class="form-signin-heading">Xpra HTML5 Client</h2>' '<h2 class="form-signin-heading">微信网页客户端</h2>';
        sub_filter '<p>You were disconnected for the following reason:</p>' '<p>您已断开连接，原因如下：</p>';
        sub_filter 'placeholder="Server"' 'placeholder="服务器"';
        sub_filter 'placeholder="Port"' 'placeholder="端口"';
        sub_filter 'placeholder="Username"' 'placeholder="用户名"';
        sub_filter 'placeholder="Password"' 'placeholder="密码"';
        sub_filter 'placeholder="Display (optional)"' 'placeholder="显示器（可选）"';
        sub_filter 'placeholder="Command"' 'placeholder="命令"';
        sub_filter 'placeholder="Desktop Command"' 'placeholder="桌面命令"';
        sub_filter 'placeholder="AES-KEY"' 'placeholder="AES 密钥"';
        sub_filter '>Connect:</label>' '>连接：</label>';
        sub_filter '>Start Command:</label>' '>启动命令：</label>';
        sub_filter '>Start Desktop:</label>' '>启动桌面：</label>';
        sub_filter '>Shadow:</label>' '>镜像：</label>';
        sub_filter '>Connect</a>' '>连接</a>';
        sub_filter '>Client URI</a>' '>客户端 URI</a>';
        sub_filter '>Connection File</a>' '>连接文件</a>';
        sub_filter '>Advanced options</h4>' '>高级选项</h4>';
        sub_filter '>None</option>' '>无限制</option>';
        sub_filter 'Bandwith Constraint' '带宽限制';
        sub_filter '>Automatic</option>' '>自动</option>';
        sub_filter 'offscreen decoding' '离屏解码';
        sub_filter '>Keyboard Layout' '>键盘布局';
        sub_filter 'On-screen keyboard' '屏幕键盘';
        sub_filter '>Clipboard sharing, preferred format:</span>' '>剪贴板共享，首选格式：</span>';
        sub_filter '>Printing</span>' '>打印</span>';
        sub_filter '>File transfers</span>' '>文件传输</span>';
        sub_filter '>Audio forwarding, codec: </span>' '>音频转发，编码器：</span>';
        sub_filter 'Terminate server when command exits' '命令退出时终止服务器';
        sub_filter 'Terminate server when client disconnects' '客户端断开时终止服务器';
        sub_filter '>Share session</span>' '>共享会话</span>';
        sub_filter '>Steal session from existing client</span>' '>从现有客户端接管会话</span>';
        sub_filter '>Re-connect automatically to the session</span>' '>自动重新连接会话</span>';
        sub_filter '>Swap command and control key</span>' '>交换 Command 和 Control 键</span>';
        sub_filter '>Reverse vertical scrolling</span>' '>反向垂直滚动</span>';
        sub_filter '>Reverse horizontal scrolling</span>' '>反向水平滚动</span>';
        sub_filter '>Floating Menu</span>' '>浮动菜单</span>';
        sub_filter '>Auto Hide</span>' '>自动隐藏</span>';
        sub_filter '>Server clock</span>' '>服务器时钟</span>';
        sub_filter 'Menu position:' '菜单位置：';
        sub_filter '>Top Left</option>' '>左上角</option>';
        sub_filter '>Top</option>' '>顶部</option>';
        sub_filter '>Top Right</option>' '>右上角</option>';
        sub_filter '>noVNC (vertical left)</option>' '>noVNC（左侧垂直）</option>';
        sub_filter '>Server Path:</span>' '>服务器路径：</span>';
        sub_filter '>Client Screen Width:</span>' '>客户端屏幕宽度：</span>';
        sub_filter '>Debugging</span>' '>调试</span>';
        sub_filter 'Secure Sockets' '安全套接字';
        sub_filter 'Insecure plain-text passwords' '不安全的明文密码';

        # ===== index.html（Xpra 主界面 / 浮动菜单）中文化 =====
        # 跨行文本由 start.sh 的 sed 预处理，这里只处理单行文本
        sub_filter '>Start</a>' '>开始</a>';
        sub_filter '>Server</a>' '>服务器</a>';
        sub_filter '>Download file</a>' '>下载文件</a>';
        sub_filter '>Shutdown Server</a>' '>关闭服务器</a>';
        sub_filter '>Information</a>' '>信息</a>';
        sub_filter '>About Xpra</a>' '>关于 Xpra</a>';
        sub_filter '>Session Info</a>' '>会话信息</a>';
        sub_filter '>Reload</a>' '>重新加载</a>';
        sub_filter '>Disconnect</a>' '>断开连接</a>';
        sub_filter 'title="Open Windows"' 'title="窗口列表"';
        sub_filter 'title="Fullscreen"' 'title="全屏"';
        sub_filter 'title="Exit Fullscreen"' 'title="退出全屏"';
        sub_filter 'title="Keyboard"' 'title="键盘"';
        sub_filter 'title="Clipboard Copy"' 'title="剪贴板复制"';
        sub_filter 'title="Audio"' 'title="音频"';
        sub_filter 'title="Lock Cursor (Gaming cursor mode)"' 'title="锁定光标（游戏模式）"';
        sub_filter 'title="Expand Menu"' 'title="展开菜单"';
        sub_filter '"audio is not available"' '"音频不可用"';

        sub_filter_once off;
        sub_filter_types text/html;
    }

    # 认证失败时 302 跳转到登录页，并带上原始 URL 供登录后回跳
    location @login_redirect {
        return 302 /login?next=$request_uri;
    }

    # ===== 消息通知端点（供注入的 JS 轮询，需 cookie 认证）=====
    # 同源请求浏览器会自动带 cookie
    location /notify/ {
        auth_request /_check;
        error_page 401 = @login_redirect;

        proxy_pass http://127.0.0.1:19892/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store" always;
        proxy_buffering off;
    }
}
