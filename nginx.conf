# 可选外部 Nginx 反向代理配置（用于 HTTPS 终止）
# 用法：
#   1. 把本文件放到 Nginx 配置目录（如 /etc/nginx/conf.d/xwechat.conf）
#   2. 替换 your-domain.com 为你的实际域名
#   3. 用 certbot 申请证书：certbot --nginx -d your-domain.com
#   4. 重载 Nginx：nginx -s reload
#
# 注意：Basic Auth 认证由容器内 Nginx 处理，外部 Nginx 仅做 HTTPS 终止 + WebSocket 支持
#       所以这里不再需要 auth_basic 配置

# WebSocket 升级映射（Xpra 通信依赖 WebSocket）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt 证书验证用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其余全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # TLS 证书（用 certbot 自动申请后替换路径）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 所有请求（微信界面 + 通知端点 + WebSocket）都反代到容器内 Nginx
    # 容器内 Nginx 监听 1989，做 Basic Auth + 反代到 Xpra/notify-watcher
    location / {
        proxy_pass http://127.0.0.1:1989;

        # 关键：支持 WebSocket 升级（Xpra 通信依赖 WebSocket）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 透传客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接超时（Xpra 会保持长连接，默认 60s 不够）
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # 文件上传大小限制（与容器内 Nginx 保持一致）
        client_max_body_size 1024M;
    }
}
